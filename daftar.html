<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Akun</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #00a8e8, #008ac6);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.register-box {
    background: white;
    padding: 40px;
    width: 350px;
    border-radius: 15px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

.register-box h2 {
    text-align: center;
    margin-bottom: 20px;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    font-size: 14px;
    display: block;
    margin-bottom: 5px;
}

.form-group input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    padding: 12px;
    background: #00a8e8;
    border: none;
    border-radius: 25px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #008ac6;
}

.back-link {
    text-align: center;
    margin-top: 15px;
    font-size: 13px;
}

.back-link a {
    color: #00a8e8;
    text-decoration: none;
}
</style>

</head>
<body>

<div class="register-box">
    <h2>Daftar Akun</h2>

    <form>
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" placeholder="Masukkan nama lengkap">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Masukkan email">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Masukkan password">
        </div>

        <button type="submit">Daftar</button>
    </form>

    <div class="back-link">
        Sudah punya akun? <a href="index.html">Kembali</a>
    </div>
</div>

</body>
</html>
